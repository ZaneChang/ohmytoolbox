backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "articles"
    label: "文章"
    folder: "articles"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "日期", name: "date", widget: "date", default: ""}
      - {label: "阅读时间", name: "readTime", widget: "string", default: "15分钟"}
      - {label: "分类", name: "category", widget: "select", options: ["新手教程", "DeFi", "NFT", "安全", "评测"]}
      - {label: "封面图片", name: "featured_image", widget: "image", required: false}
      - {label: "摘要", name: "excerpt", widget: "text", required: false}
      - {label: "正文", name: "body", widget: "markdown"}

  - name: "tools"
    label: "工具"
    folder: "_data"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "名称", name: "name", widget: "string"}
      - {label: "描述", name: "desc", widget: "text"}
      - {label: "类型", name: "type", widget: "select", options: ["exchange", "wallet", "data", "defi", "nft", "learn"]}
      - {label: "图标", name: "icon", widget: "string"}
      - {label: "热门", name: "hot", widget: "boolean", default: false}
      - {label: "链接", name: "link", widget: "string"}
