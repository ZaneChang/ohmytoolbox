<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OhMyToolbox Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --bg: #0f0f14;
            --card: #18181f;
            --border: #27272a;
            --text: #fafafa;
            --text-dim: #a1a1aa;
            --green: #22c55e;
            --red: #ef4444;
        }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        .login { 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; 
        }
        .login-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 40px; width: 350px; text-align: center;
        }
        .login-box h2 { margin-bottom: 24px; }
        .login-box input {
            width: 100%; padding: 14px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--bg); color: var(--text);
            margin-bottom: 16px; font-size: 14px;
        }
        .login-box button {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            background: var(--primary); color: #fff; font-weight: 600; cursor: pointer;
        }
        .error { color: var(--red); font-size: 14px; margin-bottom: 16px; display: none; }
        
        .admin { display: none; padding: 30px; max-width: 1200px; margin: 0 auto; }
        .admin.active { display: block; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; }
        .header button { 
            padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); cursor: pointer;
        }
        
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat { 
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; flex: 1; text-align: center;
        }
        .stat-num { font-size: 32px; font-weight: 700; color: var(--primary); }
        .stat-label { color: var(--text-dim); font-size: 14px; margin-top: 4px; }
        
        .section { margin-bottom: 40px; }
        .section h2 { margin-bottom: 20px; font-size: 20px; display: flex; justify-content: space-between; }
        
        .add-form { 
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; margin-bottom: 20px;
        }
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .form-row input, .form-row select {
            flex: 1; padding: 12px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--bg); color: var(--text);
            font-size: 14px;
        }
        .form-row button {
            padding: 12px 24px; border-radius: 10px; border: none;
            background: var(--green); color: #fff; font-weight: 600; cursor: pointer;
        }
        
        .tools-list { display: grid; gap: 12px; }
        .tool-item {
            display: flex; align-items: center; gap: 16px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px;
        }
        .tool-icon { font-size: 24px; }
        .tool-info { flex: 1; }
        .tool-name { font-weight: 600; }
        .tool-desc { color: var(--text-dim); font-size: 13px; }
        .tool-type { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: var(--primary); color: #fff; }
        .tool-actions { display: flex; gap: 8px; }
        .tool-actions button {
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); cursor: pointer; font-size: 12px;
        }
        .tool-actions .delete { color: var(--red); border-color: var(--red); }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            padding: 10px 20px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--card); color: var(--text-dim); cursor: pointer;
        }
        .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    </style>
</head>
<body>
    <!-- Login -->
    <div class="login" id="loginPage">
        <div class="login-box">
            <h2>🔐 Admin Login</h2>
            <p style="color:var(--text-dim);margin-bottom:20px;font-size:14px;">Default: admin / toolbox123</p>
            <div class="error" id="error">Invalid password</div>
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
        </div>
    </div>
    
    <!-- Admin Panel -->
    <div class="admin" id="adminPage">
        <div class="header">
            <h1>🧰 OhMyToolbox Admin</h1>
            <button onclick="logout()">Logout</button>
        </div>
        
        <div class="stats">
            <div class="stat"><div class="stat-num" id="totalAI">0</div><div class="stat-label">AI Tools</div></div>
            <div class="stat"><div class="stat-num" id="totalTG">0</div><div class="stat-label">Communities</div></div>
            <div class="stat"><div class="stat-num" id="totalPro">0</div><div class="stat-label">Productivity</div></div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('ai')">AI Tools</div>
            <div class="tab" onclick="showTab('tg')">Communities</div>
            <div class="tab" onclick="showTab('productivity')">Productivity</div>
        </div>
        
        <div class="section">
            <h2>➕ Add New Tool</h2>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="newName" placeholder="Tool Name">
                    <input type="url" id="newUrl" placeholder="URL https://...">
                    <select id="newType">
                        <option value="ai">AI Tools</option>
                        <option value="tg">Communities</option>
                        <option value="productivity">Productivity</option>
                    </select>
                </div>
                <div class="form-row">
                    <input type="text" id="newDesc" placeholder="Description" style="flex:3">
                    <input type="text" id="newIcon" placeholder="Emoji icon" style="flex:1">
                    <button onclick="addTool()">Add</button>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>📋 Manage Tools</h2>
            <div class="tools-list" id="toolsList"></div>
        </div>
    </div>
    
    <script>
        // Simple password check (in production, use proper auth)
        const PASSWORD = 'toolbox123';
        
        // Load data from main index.html
        let aiTools = JSON.parse(localStorage.getItem('omt_admin_ai') || '[]') || [
            { name: 'Claude', desc: 'Anthropic flagship AI model', type: 'ai', icon: '🧠', link: 'https://claude.ai' },
            { name: 'ChatGPT', desc: 'OpenAI GPT-4', type: 'ai', icon: '💬', link: 'https://chat.openai.com' },
            { name: 'DeepSeek', desc: 'Open source AI model', type: 'ai', icon: '🔮', link: 'https://chat.deepseek.com' },
        ];
        let tgChannels = JSON.parse(localStorage.getItem('omt_admin_tg') || '[]') || [
            { name: 'OpenAI', desc: 'Official OpenAI', type: 'tg', icon: '🤖', link: 'https://t.me/openai' },
            { name: 'GitHub', desc: 'Developer community', type: 'tg', icon: '🐙', link: 'https://t.me/github' },
        ];
        let productivity = JSON.parse(localStorage.getItem('omt_admin_pro') || '[]') || [
            { name: 'Notion', desc: 'All-in-one workspace', type: 'productivity', icon: '📒', link: 'https://notion.so' },
        ];
        
        let currentTab = 'ai';
        
        function login() {
            const pwd = document.getElementById('password').value;
            if (pwd === PASSWORD) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').classList.add('active');
                loadData();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
        
        function logout() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('adminPage').classList.remove('active');
            document.getElementById('password').value = '';
        }
        
        function loadData() {
            document.getElementById('totalAI').textContent = aiTools.length;
            document.getElementById('totalTG').textContent = tgChannels.length;
            document.getElementById('totalPro').textContent = productivity.length;
            renderList();
        }
        
        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderList();
        }
        
        function renderList() {
            let data = currentTab === 'ai' ? aiTools : currentTab === 'tg' ? tgChannels : productivity;
            const list = document.getElementById('toolsList');
            list.innerHTML = data.map((t, i) => `
                <div class="tool-item">
                    <div class="tool-icon">${t.icon}</div>
                    <div class="tool-info">
                        <div class="tool-name">${t.name}</div>
                        <div class="tool-desc">${t.desc}</div>
                    </div>
                    <span class="tool-type">${t.type}</span>
                    <div class="tool-actions">
                        <button onclick="deleteTool(${i})" class="delete">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function addTool() {
            const name = document.getElementById('newName').value;
            const url = document.getElementById('newUrl').value;
            const type = document.getElementById('newType').value;
            const desc = document.getElementById('newDesc').value;
            const icon = document.getElementById('newIcon').value || '📌';
            
            if (!name || !url) { alert('Please fill in name and URL'); return; }
            
            const newTool = { name, link: url, type, desc, icon };
            
            if (type === 'ai') aiTools.push(newTool);
            else if (type === 'tg') tgChannels.push(newTool);
            else productivity.push(newTool);
            
            // Save
            localStorage.setItem('omt_admin_ai', JSON.stringify(aiTools));
            localStorage.setItem('omt_admin_tg', JSON.stringify(tgChannels));
            localStorage.setItem('omt_admin_pro', JSON.stringify(productivity));
            
            // Clear form
            document.getElementById('newName').value = '';
            document.getElementById('newUrl').value = '';
            document.getElementById('newDesc').value = '';
            document.getElementById('newIcon').value = '';
            
            loadData();
            alert('Tool added!');
        }
        
        function deleteTool(index) {
            if (currentTab === 'ai') aiTools.splice(index, 1);
            else if (currentTab === 'tg') tgChannels.splice(index, 1);
            else productivity.splice(index, 1);
            
            localStorage.setItem('omt_admin_ai', JSON.stringify(aiTools));
            localStorage.setItem('omt_admin_tg', JSON.stringify(tgChannels));
            localStorage.setItem('omt_admin_pro', JSON.stringify(productivity));
            
            loadData();
        }
        
        // Check if already logged in (session)
        if (sessionStorage.getItem('omt_admin_logged')) {
            login();
        }
    </script>
</body>
</html>
