        // Simple markdown to HTML converter
        function mdToHtml(md) {
            if (!md) return '';
            
            // Headers
            md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            md = md.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            // Bold
            md = md.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            // Italic
            md = md.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            // Links
            md = md.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
            
            // Lists
            md = md.replace(/^- (.+)$/gm, '<li>$1</li>');
            md = md.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            
            // Line breaks
            md = md.replace(/\n\n/g, '</p><p>');
            md = md.replace(/\n/g, '<br>');
            
            return '<p>' + md + '</p>';
        }

                const excerpt = frontmatter.match(/excerpt:\s*(.+)/)?.[1] || '';
                
                // Convert markdown body to HTML

            }
        }

                        const categoryMatch = text.match(/category:\s*(.+)/);
                        const excerptMatch = text.match(/excerpt:\s*(.+)/);
                        
                        const title = titleMatch ? titleMatch[1] : file.replace('articles/','').replace('.md','').replace('.html','');
                        const date = dateMatch ? dateMatch[1] : '';
                        const readTime = readTimeMatch ? readTimeMatch[1] : '15分钟';
                        const category = categoryMatch ? categoryMatch[1] : '文章';
                        const excerpt = excerptMatch ? excerptMatch[1] : '';
                        
                        // Check search
                        const match = !searchText || 
                            title.toLowerCase().includes(searchText) || 
                            (excerpt && excerpt.toLowerCase().includes(searchText));
                        
                        if (match) {
                            articles.push({
                                name: title,
                                desc: `${date} · ${readTime}阅读 · ${category}`,
                                type: 'article',
                                icon: '📖',
                                link: file,
                                hot: false
                            });
                        }
                    } catch(e) {
                        console.log('Could not load:', file);
                    }
                }
                
                document.getElementById('articleCount').textContent = articles.length;
                
                gridEl.innerHTML = articles.map(t => `
                    <div class="card" onclick="loadArticle('${t.link}');event.stopPropagation();" style="cursor:pointer;">
                        <div class="card-header">
                            <div class="card-icon">${t.icon}</div>
                            <div class="card-name">${t.name}</div>
                        </div>
                        <div class="card-desc">${t.desc}</div>
                        <div class="card-footer">
                            <span class="card-tag">📖 文章</span>
                            <span class="card-link">阅读 →</span>
                        </div>
                    </div>
                `).join('');
            };
            
            loadArticles();
            
            // Categories

            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const categories = ['exchange', 'wallet', 'data', 'defi', 'nft', 'learn', 'article'];
            
            categories.forEach(cat => {
                // Update count
                const count = tools.filter(t => t.type === cat).length;
                const countEl = document.getElementById(cat + 'Count');
                if (countEl) countEl.textContent = count;
                
                // Filter items
                let list = tools.filter(t => t.type === cat);
                
                // Apply search filter
                if (searchText) {
                    list = list.filter(t => 
                        t.name.toLowerCase().includes(searchText) || (t.type==='article' && (t.desc && t.desc.toLowerCase().includes(searchText))) || 
                        t.desc.toLowerCase().includes(searchText)
                    );
                }
                
                // Render grid
                const gridEl = document.getElementById(cat + 'Grid');
                if (gridEl) {
                    gridEl.innerHTML = list.map(t => `
                        <div class="card" onclick="if(t.type === 'article'){loadArticle('${t.link}');event.stopPropagation();}else{window.open('${t.link}','_blank')}">
                            ${t.hot ? '<span class="hot-tag">🔥</span>' : ''}
                            <div class="card-header">
                                <div class="card-icon">${t.icon}</div>
                                <div class="card-name">${t.name}</div>
                            </div>
                            <div class="card-desc">${t.desc}</div>
                            <div class="card-footer">
                                <span class="card-tag">${t.type === 'article' ? '📖 文章' : t.type}</span>
                                <span class="card-link">前往 →</span>
                            </div>
                        </div>
                    `).join('');
                }
            });
        }
        
        render();
    </script>
</body>
</html>
