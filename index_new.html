<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OhMyToolbox | The Ultimate Resource Hub</title>
    <meta name="description" content="Curated AI tools, communities and productivity resources from around the world.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS 保持不变 */
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand">
            <div class="brand-icon">🧰</div>
            <div class="brand-text">OhMy<span>Toolbox</span></div>
        </div>
        <div class="nav-actions">
            <button class="lang-btn" onclick="toggleLang()">🌐 EN/中</button>
            <button class="nav-btn" onclick="toggleFavView()">❤️</button>
            <button class="submit-btn" onclick="openModal()">+ Submit</button>
        </div>
    </nav>
    
    <!-- Hero -->
    <section class="hero">
        <h1>Discover the Best <span>Tools & Resources</span></h1>
        <p>Curated resources from around the world.</p>
        
        <div class="stats">
            <div class="stat-box"><div class="stat-num" id="totalNum">...</div><div class="stat-label">Total</div></div>
            <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">AI Tools</div></div>
            <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">Communities</div></div>
            <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">Productivity</div></div>
        </div>
        
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" placeholder="Search..." id="search" oninput="render()">
        </div>
        
        <div class="tags">
            <div class="tag active" onclick="setFilter('all')">All</div>
            <div class="tag" onclick="setFilter('ai')">🤖 AI</div>
            <div class="tag" onclick="setFilter('tg')">📡</div>
            <div class="tag" onclick="setFilter('productivity')">⚡</div>
        </div>
    </section>
    
    <!-- Favorites -->
    <div class="favorites-area" id="favArea">
        <div class="section-header"><span class="section-icon">❤️</span><div class="section-title">My Favorites</div></div>
        <div class="grid" id="favGrid"></div>
    </div>
    
    <!-- AI Tools -->
    <div class="section-header"><span class="section-icon">🤖</span><div class="section-title">AI Tools</div></div>
    <div class="grid" id="aiGrid"></div>
    
    <!-- Communities -->
    <div class="section-header"><span class="section-icon">📡</span><div class="section-title">Communities</div></div>
    <div class="grid" id="tgGrid"></div>
    
    <!-- Productivity -->
    <div class="section-header"><span class="section-icon">⚡</span><div class="section-title">Productivity</div></div>
    <div class="grid" id="proGrid"></div>
    
    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-box">
            <h3>Submit New Tool</h3>
            <input type="text" id="name" placeholder="Tool name">
            <input type="url" id="url" placeholder="URL">
            <textarea id="desc" placeholder="Description" rows="3"></textarea>
            <div class="modal-btns">
                <button class="modal-btn" onclick="closeModal()">Cancel</button>
                <button class="modal-btn primary" onclick="submit()">Submit</button>
            </div>
        </div>
    </div>
    
    <footer><p>© 2026 OhMyToolbox</p></footer>
    
    <script>
        // ========== 配置 Supabase ==========
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'; // 替换为你的项目URL
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY'; // 替换为你的anon key
        
        // 数据存储
        let aiTools = [], tgChannels = [], productivity = [];
        let favs = JSON.parse(localStorage.getItem('omt_favs') || '[]');
        let filter = 'all', currentLang = 'en', loading = true;
        
        // ========== Supabase API ==========
        async function fetchFromSupabase(table) {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                return await res.json();
            } catch(e) {
                console.log('Supabase not connected, using fallback data');
                return null;
            }
        }
        
        // ========== 初始化 ==========
        async function init() {
            // 尝试从Supabase获取,失败则用本地数据
            const [ai, tg, pro] = await Promise.all([
                fetchFromSupabase('ai_tools'),
                fetchFromSupabase('tg_channels'),
                fetchFromSupabase('productivity')
            ]);
            
            if(ai) aiTools = ai;
            if(tg) tgChannels = tg;
            if(pro) productivity = pro;
            
            // 如果Supabase没数据,用fallback
            if(aiTools.length === 0) aiTools = getFallbackAI();
            if(tgChannels.length === 0) tgChannels = getFallbackTG();
            if(productivity.length === 0) productivity = getFallbackPro();
            
            render();
        }
        
        // ========== Fallback 数据 ==========
        function getFallbackAI() {
            return [
                {name:'Claude',name_zh:'Claude',desc:'Anthropic flagship AI',name_zh_desc:'Anthropic 旗舰AI',type:'ai,chat',icon:'🧠',hot:true,link:'https://claude.ai'},
                {name:'ChatGPT',name_zh:'ChatGPT',desc:'OpenAI GPT-4',name_zh_desc:'OpenAI GPT-4',type:'ai,chat',icon:'💬',hot:true,link:'https://chat.openai.com'},
                {name:'DeepSeek',name_zh:'DeepSeek',desc:'Open source AI',name_zh_desc:'开源大模型',type:'ai,chat',icon:'🔮',link:'https://chat.deepseek.com'},
                {name:'Midjourney',name_zh:'Midjourney',desc:'AI image generation',name_zh_desc:'AI图像生成',type:'ai,image',icon:'🎨',hot:true,link:'https://www.midjourney.com'},
                {name:'Cursor',name_zh:'Cursor',desc:'AI code editor',name_zh_desc:'AI代码编辑器',type:'ai,code',icon:'⌨️',hot:true,link:'https://cursor.sh'},
                {name:'Perplexity',name_zh:'Perplexity',desc:'AI search',name_zh_desc:'AI搜索',type:'ai,agent',icon:'🔍',link:'https://www.perplexity.ai'},
            ];
        }
        
        function getFallbackTG() {
            return [
                {name:'OpenAI',name_zh:'OpenAI',desc:'Official updates',name_zh_desc:'官方频道',type:'tg',icon:'🤖',hot:true,link:'https://t.me/openai'},
                {name:'GitHub',name_zh:'GitHub',desc:'Developer community',name_zh_desc:'开发者社区',type:'tg',icon:'🐙',hot:true,link:'https://t.me/github'},
                {name:'Product Hunt',name_zh:'Product Hunt',desc:'Product discovery',name_zh_desc:'产品发现',type:'tg',icon:'🔍',hot:true,link:'https://t.me/producthunt'},
            ];
        }
        
        function getFallbackPro() {
            return [
                {name:'Notion',name_zh:'Notion',desc:'All-in-one workspace',name_zh_desc:'全能笔记',type:'productivity',icon:'📒',hot:true,link:'https://notion.so'},
                {name:'Raycast',name_zh:'Raycast',desc:'Mac launcher',name_zh_desc:'效率启动器',type:'productivity',icon:'⚡',hot:true,link:'https://raycast.com'},
                {name:'Figma',name_zh:'Figma',desc:'UI design',name_zh_desc:'UI设计',type:'productivity',icon:'🎯',hot:true,link:'https://figma.com'},
            ];
        }
        
        // ========== 渲染 ==========
        function render() {
            const s = document.getElementById('search').value.toLowerCase();
            document.getElementById('totalNum').textContent = aiTools.length + tgChannels.length + productivity.length;
            
            const f = (arr, cat) => arr.filter(t => {
                const inCat = filter === 'all' || t.type?.includes(filter);
                return inCat && (!s || t.name.toLowerCase().includes(s) || t.desc?.includes(s));
            });
            
            document.getElementById('aiGrid').innerHTML = f(aiTools, 'ai').map(card).join('') || '<div class="empty">No results</div>';
            document.getElementById('tgGrid').innerHTML = f(tgChannels, 'tg').map(card).join('') || '<div class="empty">No results</div>';
            document.getElementById('proGrid').innerHTML = f(productivity, 'pro').map(card).join('') || '<div class="empty">No results</div>';
            
            const all = [...aiTools, ...tgChannels, ...productivity];
            document.getElementById('favGrid').innerHTML = all.filter(t => favs.includes(t.name)).map(card).join('') || '<div class="empty">No favorites</div>';
        }
        
        function card(t) {
            const name = currentLang === 'zh' && t.name_zh ? t.name_zh : t.name;
            const desc = currentLang === 'zh' && t.name_zh_desc ? t.name_zh_desc : t.desc;
            const hot = t.hot ? '<span class="hot-tag">' + (currentLang === 'zh' ? '🔥 热门' : '🔥 Hot') + '</span>' : '';
            const active = favs.includes(t.name) ? 'active' : '';
            return `<div class="card" onclick="window.open('${t.link}','_blank')">${hot}<div class="card-header"><div class="card-icon">${t.icon}</div><div class="card-name">${name}</div><button class="card-fav ${active}" onclick="event.stopPropagation();toggle('${t.name}')">❤️</button></div><div class="card-desc">${desc}</div><div class="card-footer"><span class="card-tag">${t.type?.split(',')[0]}</span><span class="card-link">${currentLang === 'zh' ? '访问 →' : 'Visit →'}</span></div></div>`;
        }
        
        function setFilter(f) { filter = f; document.querySelectorAll('.tag').forEach(t => t.classList.remove('active')); event.target.classList.add('active'); render(); }
        function toggle(n) { favs = favs.includes(n) ? favs.filter(x => x !== n) : [...favs, n]; localStorage.setItem('omt_favs', JSON.stringify(favs)); render(); }
        function toggleFavView() { document.getElementById('favArea').classList.toggle('active'); window.scrollTo({top:0,behavior:'smooth'}); }
        
        function toggleLang() { currentLang = currentLang === 'en' ? 'zh' : 'en'; render(); document.querySelector('.hero h1').innerHTML = currentLang === 'en' ? 'Discover the Best <span>Tools & Resources</span>' : '发现你的<span>万能工具箱</span>'; document.querySelector('.hero p').textContent = currentLang === 'en' ? 'Curated resources from around the world.' : '精选全球好用的工具,一个就够了'; }
        
        function openModal() { document.getElementById('modal').classList.add('active'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        
        function submit() { const name = document.getElementById('name').value; if(name) { alert('Thanks! Will review.'); closeModal(); document.getElementById('name').value = ''; document.getElementById('url').value = ''; document.getElementById('desc').value = ''; } }
        
        init();
    </script>
</body>
</html>
